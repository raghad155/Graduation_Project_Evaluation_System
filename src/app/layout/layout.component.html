<div class="app-shell" [class.sidebar-open]="sidebarOpen" [class.layout-rtl]="isArabic" [class.layout-ltr]="!isArabic"
  [attr.dir]="isArabic ? 'rtl' : 'ltr'">
  <aside class="sidebar" [attr.aria-label]="sidebarLabel">
    <div class="sidebar-brand">
      <img class="brand-logo sidebar-logo" src="/assets/ges-logo.png" alt="GES logo">
      <div>
        <strong>{{ brandTitle }}</strong>
        <small>{{ appSubtitle }}</small>
      </div>
    </div>

    <nav class="side-nav" [attr.aria-label]="mainNavigationLabel">
      @for (link of visibleLinks; track link.route) {
      <a [routerLink]="link.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidebar()">
        <span class="nav-icon" aria-hidden="true">
          <app-icon [name]="link.icon"></app-icon>
        </span>
        <span class="nav-label">{{ navLabel(link) }}</span>
      </a>
      }
    </nav>
  </aside>

  <header class="navbar">
    <button class="menu-button" type="button" (click)="toggleSidebar()" [title]="menuTitle"
      [attr.aria-label]="menuTitle">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="navbar-title">
      <strong>{{ appTitle }}</strong>
      <span>{{ translatedRole }}</span>
    </div>

    <div class="user-area">
      @if (showSettingsLink) {
      <a class="settings-link" routerLink="/settings" [title]="settingsTitle" [attr.aria-label]="settingsTitle">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 16 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.22.35.35.75.4 1.1H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z">
          </path>
        </svg>
      </a>
      }

      <span class="user-avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 21a8 8 0 0 1 16 0"></path>
        </svg>
      </span>
      <div class="user-chip">
        <span>{{ user?.name }}</span>
        <small>{{ user?.email || user?.username }}</small>
      </div>
      <button class="logout-button" type="button" (click)="logout()">{{ logoutLabel }}</button>
    </div>
  </header>

  <main class="main-content">
    <router-outlet />
  </main>

  <footer class="footer">
    <span>{{ footerText }}</span>
  </footer>

  <button class="backdrop" type="button" [attr.aria-label]="closeSidebarLabel" (click)="closeSidebar()"></button>
</div>
